[package]
name = "tlg"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
name = "tlg"
crate-type = ["rlib"]

[dependencies]
image = { version = "0.25.10", default-features = false, features = ["png"] }

[dev-dependencies]
criterion = "0.8.2"
rand = "0.10.0"

[[bench]]
name = "slide"
harness = false
path = "bench/slide.rs"

[[bench]]
name = "tlg5-encode"
harness = false
path = "bench/tlg5_encode.rs"

